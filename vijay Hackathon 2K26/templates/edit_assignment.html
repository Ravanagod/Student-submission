<h2>Edit Assignment</h2>

<form action="/update-assignment/{{assignment.id}}" method="post">

Title

<input type="text" name="title" value="{{assignment.title}}">

Description

<input type="text" name="description" value="{{assignment.description}}">

Deadline

<input type="date" name="deadline" value="{{assignment.deadline}}">

<button>Update</button>

</form>
